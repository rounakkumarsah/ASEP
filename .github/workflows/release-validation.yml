name: Release Validation

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    name: Full Release Validation
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: asep
          POSTGRES_PASSWORD: test
          POSTGRES_DB: asep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.9.0
        ports:
          - 6333:6333

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/setup.py"

      - name: Install backend dependencies
        run: pip install ".[dev]"
        working-directory: backend

      - name: Run backend pytest
        run: pytest -v -s --tb=short
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql+asyncpg://asep:test@localhost:5432/asep_test"
          REDIS_URL: "redis://localhost:6379/0"
          QDRANT_HOST: "localhost"
          NEO4J_URI: "bolt://localhost:7687"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend unit tests (Vitest)
        run: npm run test:run
        working-directory: frontend

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: frontend

      - name: Compile Next.js production build
        run: npm run build
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: npm run e2e
        working-directory: frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose production config
        run: docker compose config
