name: Push to Main Validation

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Backend Lint & Tests
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: asep
          POSTGRES_PASSWORD: test
          POSTGRES_DB: asep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.9.0
        ports:
          - 6333:6333

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/setup.py"

      - name: Install dependencies
        run: pip install ".[dev]"
        working-directory: backend

      - name: Verify code formatting (Black)
        run: black --check src/ tests/
        working-directory: backend

      - name: Lint code (Ruff)
        run: ruff check src/ tests/
        working-directory: backend

      - name: Type check (MyPy)
        run: mypy src/
        working-directory: backend

      - name: Run test suite (Pytest)
        run: pytest -v -s --tb=short
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql+asyncpg://asep:test@localhost:5432/asep_test"
          REDIS_URL: "redis://localhost:6379/0"
          QDRANT_HOST: "localhost"
          NEO4J_URI: "bolt://localhost:7687"

  # Frontend Lint, Typecheck, Unit & E2E Tests
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint code (ESLint)
        run: npm run lint
        working-directory: frontend

      - name: Type check (TypeScript)
        run: npm run typecheck
        working-directory: frontend

      - name: Run Unit/Component tests (Vitest)
        run: npm run test:run
        working-directory: frontend

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: frontend

      - name: Compile Next.js production build
        run: npm run build
        working-directory: frontend

      - name: Run E2E tests (Playwright)
        run: npm run e2e
        working-directory: frontend

      - name: Upload Playwright E2E HTML Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Docker Validation Job
  docker:
    name: Docker CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify backend Dockerfile build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: asep-backend:ci

      - name: Verify frontend Dockerfile build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: asep-frontend:ci

      - name: Validate Docker Compose production config
        run: docker compose config
