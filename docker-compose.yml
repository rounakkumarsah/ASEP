# =============================================================================
# ASEP — Autonomous Software Engineering Platform
# Docker Compose — Production Stack (Phase 3.9.2)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Backend — FastAPI / LangGraph
  # ---------------------------------------------------------------------------
  asep:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asep-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      DATABASE_URL: postgresql+asyncpg://asep:changeme@postgres:5432/asep
      REDIS_URL: redis://redis:6379/0
      # Force production fail-fast checks
      APP_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - asep-network

  # ---------------------------------------------------------------------------
  # Frontend — Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: asep-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      # This is injected via args for build time, and at runtime
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - asep
    networks:
      - asep-network

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary relational store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: asep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asep
      POSTGRES_USER: asep
      POSTGRES_PASSWORD: changeme
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata
    # In production, do not expose internal DB ports to the host natively unless needed
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asep-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asep -d asep"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — Caching / message broker / ephemeral state
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: asep-redis
    restart: unless-stopped
    command: redis-server --requirepass "" --appendonly yes
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asep-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — Vector database for semantic search / embeddings
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: asep-qdrant
    restart: unless-stopped
    # ports:
    #   - "6333:6333"   # REST
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - asep-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  asep-network:
    driver: bridge
    name: asep-network
